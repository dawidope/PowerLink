name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: dotnet restore PowerLink.slnx

      - name: Build and run ShellExt utility tests
        shell: pwsh
        run: |
          msbuild tests/PowerLink.ShellExt.Tests/PowerLink.ShellExt.Tests.vcxproj `
            -p:Configuration=Release -p:Platform=x64 -nologo -v:minimal
          $exe = "tests/PowerLink.ShellExt.Tests/x64/Release/PowerLink.ShellExt.Tests.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Test exe not produced at $exe"
            exit 1
          }
          & $exe
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ShellExt utility tests failed (exit $LASTEXITCODE)."
            exit 1
          }

      - name: Publish App
        run: >
          dotnet publish src/PowerLink.App/PowerLink.App.csproj
          -c Release
          -r win-x64
          -p:Platform=x64
          -p:SelfContained=true
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -o artifacts/publish

      - name: Publish Cli into same folder
        run: >
          dotnet publish src/PowerLink.Cli/PowerLink.Cli.csproj
          -c Release
          -r win-x64
          -p:Platform=x64
          -p:SelfContained=true
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -o artifacts/publish

      - name: Sanity check payload
        shell: pwsh
        run: |
          $required = @(
            'PowerLink.App.exe',
            'PowerLink.Cli.exe',
            'PowerLink.ShellExt.dll',
            'AppxManifest.xml',
            'Assets/Icon.ico',
            'Assets/icon.png'
          )
          $missing = @()
          foreach ($f in $required) {
            $p = "artifacts/publish/$f"
            if (-not (Test-Path $p)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing from publish output: $($missing -join ', ')"
            Get-ChildItem artifacts/publish -Recurse | Select-Object -First 100
            exit 1
          }

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $ver = $tag -replace '^v',''
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Pack with Velopack
        shell: pwsh
        env:
          # Authenticate vpk's and gh's GitHub API hits so they don't fall
          # under the 60/h anonymous rate limit shared across runner IPs.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet tool install --global vpk

          # Decide up-front whether to ask vpk to fetch a prior release for
          # delta computation. The previous "run vpk download and swallow any
          # non-zero exit" pattern would have masked real failures (bad token,
          # network blip, GitHub 5xx) and let vpk pack produce a release with
          # a missing or corrupt delta — which then bricks updates on user
          # machines. Pre-checking with gh keeps the failure modes separate:
          # absence of a prior release is detected here, vpk download
          # failures are now hard errors that fail the workflow.
          $priorStable = gh release list --repo ${{ github.repository }} --limit 50 --json isDraft,isPrerelease,tagName |
              ConvertFrom-Json |
              Where-Object { -not $_.isDraft -and -not $_.isPrerelease }
          $priorCount = ($priorStable | Measure-Object).Count

          if ($priorCount -gt 0) {
            Write-Host "Found $priorCount prior stable release(s). Downloading latest for delta computation."
            # Pass --token explicitly rather than relying on vpk's implicit
            # GH_TOKEN env-var lookup. Future vpk versions may change which
            # env name they consult, and falling back to anonymous would
            # silently degrade us to the 60/h shared rate limit.
            vpk download github `
              --repoUrl https://github.com/${{ github.repository }} `
              --token $env:GH_TOKEN
            if ($LASTEXITCODE -ne 0) {
              Write-Error "vpk download failed despite prior stable release(s) existing on GitHub. Aborting to avoid shipping a release whose delta would be missing or corrupt."
              exit 1
            }
          } else {
            Write-Host "No prior stable releases found on GitHub. Producing full-only release (no delta)."
          }

          vpk pack `
            --packId PowerLink `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir artifacts/publish `
            --mainExe PowerLink.App.exe `
            --packTitle "PowerLink" `
            --packAuthors "Dawid Wenderski" `
            --outputDir velopack-output

      - uses: actions/upload-artifact@v7
        with:
          name: velopack
          path: velopack-output/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*Setup.exe
            dist/*Portable.zip
            dist/*.nupkg
            dist/releases.win.json
            dist/assets.win.json
          draft: ${{ contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
