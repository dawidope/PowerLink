name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: dotnet restore PowerLink.slnx

      - name: Publish App
        run: >
          dotnet publish src/PowerLink.App/PowerLink.App.csproj
          -c Release
          -r win-x64
          -p:Platform=x64
          -p:SelfContained=true
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -o artifacts/publish

      - name: Publish Cli into same folder
        run: >
          dotnet publish src/PowerLink.Cli/PowerLink.Cli.csproj
          -c Release
          -r win-x64
          -p:Platform=x64
          -p:SelfContained=true
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -o artifacts/publish

      - name: Sanity check payload
        shell: pwsh
        run: |
          $required = @(
            'PowerLink.App.exe',
            'PowerLink.Cli.exe',
            'PowerLink.ShellExt.dll',
            'AppxManifest.xml',
            'Assets/Icon.ico',
            'Assets/icon.png'
          )
          $missing = @()
          foreach ($f in $required) {
            $p = "artifacts/publish/$f"
            if (-not (Test-Path $p)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing from publish output: $($missing -join ', ')"
            Get-ChildItem artifacts/publish -Recurse | Select-Object -First 100
            exit 1
          }

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $ver = $tag -replace '^v',''
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Pack with Velopack
        shell: pwsh
        env:
          # Authenticate vpk's GitHub API hits so they don't fall under the
          # 60/h anonymous rate limit shared across the runner's IP pool.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet tool install --global vpk
          # Pull prior release so vpk can compute a delta against it. First-ever
          # release has nothing to download — swallow that one specific failure
          # and let vpk pack produce a full-only release. Reset $LASTEXITCODE
          # locally; $global: would persist past the script and fail the step.
          vpk download github --repoUrl https://github.com/dawidope/PowerLink
          if ($LASTEXITCODE -ne 0) {
            Write-Host "vpk download failed (likely no prior Velopack release). Continuing with full release only."
            $LASTEXITCODE = 0
          }
          vpk pack `
            --packId PowerLink `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir artifacts/publish `
            --mainExe PowerLink.App.exe `
            --packTitle "PowerLink" `
            --packAuthors "Dawid Wenderski" `
            --outputDir velopack-output

      - uses: actions/upload-artifact@v7
        with:
          name: velopack
          path: velopack-output/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*Setup.exe
            dist/*Portable.zip
            dist/*.nupkg
            dist/releases.win.json
            dist/assets.win.json
          draft: ${{ contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
